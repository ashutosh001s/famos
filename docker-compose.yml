version: '3.9'

services:
  famos-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: famos-backend
    restart: unless-stopped

    # Mount persistent volumes OUTSIDE the container
    # These persist across container rebuilds/updates
    volumes:
      - ./data/db:/app/instance              # SQLite database file
      - ./data/uploads:/app/secure_uploads   # Uploaded documents
      - ./data/logs:/app/logs                # Application logs
      - ./backend/.env:/app/.env:ro          # Secrets (read-only inside container)

    ports:
      - "127.0.0.1:5000:5000"   # Only bind to loopback — Cloudflare tunnel handles external access
                                  # This prevents direct internet exposure of Flask

    environment:
      - PYTHONUNBUFFERED=1

    # Resource limits — prevents runaway memory on a home server
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Optional: Cloudflare Tunnel container (alternative to system service)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: famos-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro    # Contains config.yml and tunnel credentials
    depends_on:
      famos-backend:
        condition: service_healthy
    network_mode: "host"                      # Allows cloudflared to reach localhost:5000
